<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Solar System Interactive</title>

<style>
  .sun { box-shadow: 0 0 120px yellow; }
.earth{
  box-shadow:
  0 0 20px #2b7cff,
  0 0 40px rgba(43,124,255,.5);
  width:50px;
  height:50px;
  border-radius:50%;
  position:absolute;
  top:-25px;
  left:50%;
  transform:translateX(-50%) rotate(23.5deg);
  cursor:pointer;
  box-shadow:0 0 25px rgba(43,124,255,.5);
  animation:earthRotate 10s linear infinite;
}
@keyframes earthRotate {
  from { transform: translateX(-50%) rotate(0deg); }
  to   { transform: translateX(-50%) rotate(360deg); }
}
animation: earthRotate 10s linear infinite;

@keyframes earthRotate {
  from { transform: translateX(-50%) rotate(0deg); }
  to   { transform: translateX(-50%) rotate(360deg); }
}
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
  color:white;
}

/* ⭐ STARS */
.stars {
  
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(white 1px, transparent 1px),
    radial-gradient(white 2px, transparent 2px),
    radial-gradient(white 0.5px, transparent 0.5px);
  background-size: 80px 80px, 160px 160px, 100px 100px;
  animation: starsMove 120s linear infinite, starsTwinkle 3s ease-in-out infinite alternate;
  opacity: 0.6;
  transition: transform 0.2s linear;
will-change: transform;
}
@keyframes starsTwinkle {
  0% { opacity: 0.3; }
  50% { opacity: 0.6; }
  100% { opacity: 0.3; }
}

@keyframes starsMove {
  to { transform: translate(-600px, -600px); }
}

@keyframes starsMove {
  to { transform: translate(-600px, -600px); }
}
@keyframes starsMove{
  to{transform:translate(-600px,-600px);}
}

/* ☀️ SUN */
.sun{
  width:120px;
  height:120px;
  background:radial-gradient(circle, orange, red);
  border-radius:50%;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  box-shadow:0 0 120px orange, 0 0 200px red;
  cursor:pointer;
  z-index:5;
}

/* 🌍 ORBIT */
.orbit{
  animation:orbit 60s linear infinite;
  width:500px;
  height:500px;
  border:1px dashed rgba(255,255,255,.2);
  border-radius:50%;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  animation:orbit 60s linear infinite;
}

/* 🌍 EARTH */
.earth{
  width:50px;
  height:50px;
  border-radius:50%;
  position:absolute;
  top:-25px;
  left:50%;
  transform:translateX(-50%);
  cursor:pointer;
}

/* 🌙 MOON */
 .moon-orbit{
  animation:orbit 15s linear infinite;
  width:120px;
  height:120px;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  animation:orbit 24s linear infinite;
}
.moon{
  width:20px;
  height:20px;
  border-radius:50%;
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%);
  background:radial-gradient(circle,#ddd,#555);
  box-shadow:0 0 10px white;
  cursor:pointer;
}

/* 🎛 CONTROLS */
.panel{
  position:absolute;
  left:20px;
  bottom:20px;
  z-index:10;
}
button,input{
  margin-top:6px;
  padding:8px 14px;
  border-radius:8px;
  border:1px solid white;
  background:#222;
  color:white;
  cursor:pointer;
}

/* ℹ️ INFO */
#info{
  position:absolute;
  right:20px;
  top:20px;
  width:420px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(5px);
  padding:15px;
  border-radius:12px;
  border:1px solid white;
  line-height:1.5;
}

/* ➡️ GRAVITY ARROWS */
svg{
  position:absolute;
  inset:0;
  pointer-events:none;
}

svg line{
  stroke-dasharray:8;
  animation:gravityFlow 2s linear infinite;
}

@keyframes gravityFlow{
  from{stroke-dashoffset:0}
  to{stroke-dashoffset:-16}
}
text{
  fill:white;
  font-weight:bold;
  font-size:14px;
}

@keyframes orbit{
  to{transform:translate(-50%,-50%) rotate(360deg);}
}
#camera{
  width:100%;
  height:100%;
  transition: transform 1s ease;
  transform-origin:center;
}

</style>
</head>

<body>
  <div id="camera"></div>
<div class="sun" id="sun"></div>
<div class="shooting-star"></div>
<div class="orbit" id="orbit">
  <div class="earth" id="earth">
    <div class="moon-orbit" id="moonOrbit">
      <div class="moon" id="moon"></div>
    </div>
  </div>
</div>

<!-- ➡️ GRAVITY -->
<svg>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="white"/>
    </marker>
  </defs>

  <line id="sunEarth" stroke="white" stroke-width="2"
stroke-dasharray="8"
marker-end="url(#arrow)"/>
  <line id="earthMoon" stroke="white" stroke-width="2" marker-end="url(#arrow)"/>

  <text id="txtSE">Gravity</text>
  <text id="txtEM">Gravity</text>
</svg>

<div class="panel">
  <label>Time Speed</label>
  <button id="seasons">🍂 Seasons</button><br>
  <input type="range" min="20" max="200" value="80" id="speed"><br>
  <button id="pause">⏸ Pause</button><br>
  <button id="atmos">🌐 Atmospheric Phenomena</button>
</div>

<div id="info">INTERACT WITH THE SYSTEM</div>

<script>
  function typeText(text){

 info.innerHTML="";
 let i=0;

 function typing(){
   if(i<text.length){
     info.innerHTML+=text.charAt(i);
     i++;
     setTimeout(typing,20);
   }
 }

 typing();
 document.addEventListener("mousemove",(e)=>{

 const x = (e.clientX / window.innerWidth - 0.5);
 const y = (e.clientY / window.innerHeight - 0.5);

 const stars = document.querySelector(".stars");

 stars.style.transform =
 `translate(${x*-40}px, ${y*-40}px)`;

});
}
const sun = document.getElementById("sun");
const camera = document.getElementById("camera");
const earth = document.getElementById("earth");
const moon = document.getElementById("moon");
const orbit = document.getElementById("orbit");
const moonOrbit = document.getElementById("moonOrbit");
const info = document.getElementById("info");
const pauseBtn = document.getElementById("pause");
const speed = document.getElementById("speed");
const atmos = document.getElementById("atmos");
const seasons = document.getElementById("seasons");
function eclipseCheck(){

 const m = moon.getBoundingClientRect();
 const s = sun.getBoundingClientRect();

 const distance =
 Math.abs((m.x+m.width/2)-(s.x+s.width/2));

 if(distance < 40){
   earth.style.filter="brightness(0.4)";
 }else{
   earth.style.filter="brightness(1)";
 }

 requestAnimationFrame(eclipseCheck);
}
eclipseCheck();
{}
/* 🌙 MOON INFO */
moon.onclick = e => {
  e.stopPropagation();
  info.innerHTML = `🌙 MOON<br>
Orbits Earth every 27 days.<br><br>
🌗 Moon Phases<br>
We see different phases because we observe different portions of the illuminated half.<br><br>
🌑 Eclipses<br>
Solar Eclipse: Moon blocks sunlight.<br>
Lunar Eclipse: Earth blocks sunlight from reaching the Moon.`;
};

/* 🌑 MOON PHASE */
function moonPhase(){
  const m = moon.getBoundingClientRect();
  const e = earth.getBoundingClientRect();
  const dx = m.x - e.x;
  const phase = (dx / 120 + 1) / 2;
  moon.style.background =
    `radial-gradient(circle at ${phase*100}% 50%, #ddd 60%, #333 62%)`;
  requestAnimationFrame(moonPhase);
}
moonPhase();

/* 🌍 EARTH PHASE / SHADOW */
function earthPhase(){
  const s = sun.getBoundingClientRect();
  const e = earth.getBoundingClientRect();
  const dx = s.x - e.x;
  const phase = (dx / 500 + 1) / 2;
  earth.style.background =
    `radial-gradient(circle at ${phase*100}% 50%, #2b7cff 60%, #001 70%)`;
  requestAnimationFrame(earthPhase);
}
earthPhase();

/* ☀️ SUN INFO */
sun.onclick = () => {
  info.innerHTML = `☀️ SUN<br>
Largest body in the system.<br>
Produces energy by nuclear fusion.<br>
Its gravity keeps planets in orbit.<br><br>
🌅 Atmospheric Phenomenon<br>
Sunlight passing through Earth's atmosphere causes sunsets and sunrises to appear orange due to light scattering.`;
};

/* 🌍 EARTH INFO */
earth.onclick = e => {
  e.stopPropagation();
  info.innerHTML = `🌍 EARTH<br>
Rotation: 24 hours. Revolution: 365 days. Tilt: 23.5°.<br><br>
🌞 How Seasons Happen<br>
Because Earth is tilted, different parts receive more direct sunlight during the year.<br><br>
🪐 Gravitational Interaction<br>
Earth stays in orbit because the Sun's gravity pulls it inward while Earth moves forward in space.`;
};

/* 🍂 SEASONS */
function updateSeasons(){
  const e = earth.getBoundingClientRect();
  const center = window.innerWidth/2;

  let season;

  if(e.x < center - 100) season="❄️ WINTER";
  else if(e.x < center) season="🌸 SPRING";
  else if(e.x < center + 100) season="☀️ SUMMER";
  else season="🍂 AUTUMN";

  seasons.textContent = season;

  requestAnimationFrame(updateSeasons);
}
updateSeasons();

/* 🌐 ATMOSPHERE */
atmos.onclick = () => {
  info.innerHTML = `🌈 Rainbows<br>
Form when sunlight bends through raindrops and separates into colors.<br><br>
🔵 Different colors in the sky<br>
Blue sky happens because shorter wavelengths scatter more. Red/orange sunsets occur due to light traveling through more atmosphere.<br><br>
🌌 Auroras<br>
Charged particles from the Sun interact with Earth's magnetic field and atmosphere, producing colorful lights.<br><br>
🌡️ Atmospheric pressure & temperature gradients<br>
Differences in temperature create pressure differences that move air (wind).<br><br>
⛈️ Weather phenomena<br>
Hurricanes and cyclones form over warm oceans due to low pressure systems.<br>
Tornadoes form from strong rotating thunderstorms.`;
};

/* ⏸ PAUSE */
let paused = false;
pauseBtn.onclick = () => {

  paused = !paused;

  document.querySelectorAll("*").forEach(el=>{
    el.style.animationPlayState = paused ? "paused" : "running";
  });

  pauseBtn.textContent = paused ? "▶ Play" : "⏸ Pause";

};

/* ⏱ SPEED */
speed.oninput = () => {
  orbit.style.animationDuration = speed.value + "s";
};

/* ➡️ GRAVITY ARROWS */
const se = document.getElementById("sunEarth");
const em = document.getElementById("earthMoon");
const t1 = document.getElementById("txtSE");
const t2 = document.getElementById("txtEM");

function gravity(){
  const s = sun.getBoundingClientRect();
  const e = earth.getBoundingClientRect();
  const m = moon.getBoundingClientRect();

  se.setAttribute("x1", s.x + s.width/2);
  se.setAttribute("y1", s.y + s.height/2);
  se.setAttribute("x2", e.x + e.width/2);
  se.setAttribute("y2", e.y + e.height/2);

  em.setAttribute("x1", e.x + e.width/2);
  em.setAttribute("y1", e.y + e.height/2);
  em.setAttribute("x2", m.x + m.width/2);
  em.setAttribute("y2", m.y + m.height/2);

  t1.setAttribute("x", (s.x + e.x)/2);
  t1.setAttribute("y", (s.y + e.y)/2);

  t2.setAttribute("x", (e.x + m.x)/2);
  t2.setAttribute("y", (e.y + m.y)/2);

  requestAnimationFrame(gravity);
}
gravity();
</script>
</div>
<div class="stars stars-back"></div>
<div class="stars stars-mid"></div>
<div class="stars stars-front"></div>
</body>
</html>
